# configs/default.yaml

data:
  processed_dir: "data/processed/cochleograms_rgb"
  metadata_path: "data/processed/metadata.csv"
  classes: ["normal", "crackle", "wheeze", "both"]

model:
  name: "CochleogramViT"
  image_size: 128
  patch_size: 16
  num_classes: 4
  dim: 512
  depth: 6
  heads: 8
  mlp_dim: 1024
  dropout: 0.3
  emb_dropout: 0.2
  channels: 3

training:
  epochs: 30
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.0001
  warmup_epochs: 4
  seed: 42
  n_splits: 10
  num_workers: 0
  device: "cuda"

logging:
  log_dir: "runs/"
  save_dir: "checkpoints/"
  log_every: 10